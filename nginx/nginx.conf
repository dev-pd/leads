# Reverse proxy: single public origin in front of the Next.js app and the API.
# Browser hits http://localhost only; nginx routes by path. Same-origin => no
# CORS, and the JWT cookie is first-party.
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    sendfile on;
    client_max_body_size 12m; # must exceed the app's MAX_UPLOAD_MB (10m) + headers

    upstream backend {
        server backend:8000;
    }
    upstream frontend {
        server frontend:3000;
    }

    server {
        listen 80;
        server_name _;

        # API + OpenAPI docs go to FastAPI.
        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        location /docs {
            proxy_pass http://backend;
            proxy_set_header Host $host;
        }
        location /openapi.json {
            proxy_pass http://backend;
            proxy_set_header Host $host;
        }
        location /health {
            proxy_pass http://backend;
        }

        # Everything else is the Next.js app (incl. _next assets, HMR ws).
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
